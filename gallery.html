<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery — Nina Moses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="gallery.css" />
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">← Nina Moses</a>
    <h1>Photo Gallery</h1>
  </nav>

  <main class="container">
    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">‹</button>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next">›</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
